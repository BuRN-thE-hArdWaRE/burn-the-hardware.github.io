<svg xmlns="http://www.w3.org/2000/svg" width="576" height="432" viewBox="0 0 576 432" role="img" aria-labelledby="title desc">
  <title id="title">PID Tuning Progress (Kp over Iterations)</title>
  <desc id="desc">Line chart showing Kp increasing over eight tuning iterations.</desc>
  <rect width="576" height="432" fill="#ffffff"/>
  <text x="288" y="28" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#111827">PID Tuning Progress (Kp over Iterations)</text>
  <line x1="70" y1="390" x2="542" y2="390" stroke="#111827" stroke-width="2"/>
  <line x1="70" y1="50" x2="70" y2="390" stroke="#111827" stroke-width="2"/>
  <g font-family="Arial, sans-serif" font-size="12" fill="#374151" text-anchor="middle">
    <text x="94" y="408">1</text>
    <text x="158" y="408">2</text>
    <text x="222" y="408">3</text>
    <text x="286" y="408">4</text>
    <text x="350" y="408">5</text>
    <text x="414" y="408">6</text>
    <text x="478" y="408">7</text>
    <text x="542" y="408">8</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="12" fill="#374151" text-anchor="end">
    <text x="60" y="392">0</text>
    <text x="60" y="312">5</text>
    <text x="60" y="232">10</text>
    <text x="60" y="152">15</text>
    <text x="60" y="72">20</text>
  </g>
  <g stroke="#e5e7eb" stroke-width="1">
    <line x1="70" y1="310" x2="542" y2="310"/>
    <line x1="70" y1="230" x2="542" y2="230"/>
    <line x1="70" y1="150" x2="542" y2="150"/>
    <line x1="70" y1="70" x2="542" y2="70"/>
  </g>
  <polyline fill="none" stroke="#2563eb" stroke-width="3" points="94,374 158,342 222,310 286,278 350,262 414,198 478,102 542,86"/>
  <g fill="#2563eb">
    <circle cx="94" cy="374" r="4"/>
    <circle cx="158" cy="342" r="4"/>
    <circle cx="222" cy="310" r="4"/>
    <circle cx="286" cy="278" r="4"/>
    <circle cx="350" cy="262" r="4"/>
    <circle cx="414" cy="198" r="4"/>
    <circle cx="478" cy="102" r="4"/>
    <circle cx="542" cy="86" r="4"/>
  </g>
  <text x="306" y="425" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#111827">Iteration</text>
  <text x="20" y="220" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#111827" transform="rotate(-90 20 220)">Kp Value</text>
</svg>
