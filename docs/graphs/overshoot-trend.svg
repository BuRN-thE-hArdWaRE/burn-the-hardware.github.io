<svg xmlns="http://www.w3.org/2000/svg" width="576" height="432" viewBox="0 0 576 432" role="img" aria-labelledby="title desc">
  <title id="title">Overshoot Trend During Tuning</title>
  <desc id="desc">Line chart showing overshoot falling over eight tuning iterations.</desc>
  <rect width="576" height="432" fill="#ffffff"/>
  <text x="288" y="28" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#111827">Overshoot Trend During Tuning</text>
  <line x1="70" y1="390" x2="542" y2="390" stroke="#111827" stroke-width="2"/>
  <line x1="70" y1="50" x2="70" y2="390" stroke="#111827" stroke-width="2"/>
  <g font-family="Arial, sans-serif" font-size="12" fill="#374151" text-anchor="middle">
    <text x="94" y="408">1</text>
    <text x="158" y="408">2</text>
    <text x="222" y="408">3</text>
    <text x="286" y="408">4</text>
    <text x="350" y="408">5</text>
    <text x="414" y="408">6</text>
    <text x="478" y="408">7</text>
    <text x="542" y="408">8</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="12" fill="#374151" text-anchor="end">
    <text x="60" y="392">0</text>
    <text x="60" y="326">1e8</text>
    <text x="60" y="260">2e8</text>
    <text x="60" y="194">3e8</text>
    <text x="60" y="128">4e8</text>
    <text x="60" y="62">5e8+</text>
  </g>
  <g stroke="#e5e7eb" stroke-width="1">
    <line x1="70" y1="324" x2="542" y2="324"/>
    <line x1="70" y1="258" x2="542" y2="258"/>
    <line x1="70" y1="192" x2="542" y2="192"/>
    <line x1="70" y1="126" x2="542" y2="126"/>
    <line x1="70" y1="60" x2="542" y2="60"/>
  </g>
  <polyline fill="none" stroke="#2563eb" stroke-width="3" points="94,60 158,144 222,228 286,294 350,328 414,386 478,389 542,390"/>
  <g fill="#2563eb">
    <circle cx="94" cy="60" r="4"/>
    <circle cx="158" cy="144" r="4"/>
    <circle cx="222" cy="228" r="4"/>
    <circle cx="286" cy="294" r="4"/>
    <circle cx="350" cy="328" r="4"/>
    <circle cx="414" cy="386" r="4"/>
    <circle cx="478" cy="389" r="4"/>
    <circle cx="542" cy="390" r="4"/>
  </g>
  <text x="306" y="425" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#111827">Iteration</text>
  <text x="20" y="220" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#111827" transform="rotate(-90 20 220)">Overshoot (%)</text>
</svg>
