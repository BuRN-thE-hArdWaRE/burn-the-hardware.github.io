<svg xmlns="http://www.w3.org/2000/svg" width="576" height="432" viewBox="0 0 576 432" role="img" aria-labelledby="title desc">
  <title id="title">PID Gains over Iterations</title>
  <desc id="desc">Multi-line chart showing Kp, Ki, and Kd over eight tuning iterations.</desc>
  <rect width="576" height="432" fill="#ffffff"/>
  <text x="288" y="28" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#111827">PID Gains over Iterations</text>
  <rect x="70" y="48" width="78" height="62" fill="#ffffff" stroke="#d1d5db"/>
